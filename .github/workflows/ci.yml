name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Syntax check JS files
        run: |
          node --check server.mjs
          node --check scripts/seed.mjs
          for f in api/**/*.js; do node --check "$f"; done

      - name: Run tests
        run: node --test tests/seed.test.mjs
