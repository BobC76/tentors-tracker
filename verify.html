<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ten Tors Tracker</title>
  <link rel="stylesheet" href="vendor/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    body { font: 13px/1.4 system-ui, sans-serif; }
    .panel {
      position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 1000;
      background: white; padding: 12px 16px;
      border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.3);
      max-height: 60vh; overflow: auto;
      max-width: 380px;
    }
    .panel h2 { margin: 0 0 4px; font-size: 15px; }
    .meta { font-size: 12px; color: #666; margin-bottom: 8px; }
    .team { padding: 4px 0; }
    .team .nm { font-weight: 600; font-size: 15px; }
    .team .wp { color: #444; font-size: 13px; margin-top: 2px; }
    .team .pace { color: #999; }
    .team.finished .nm { color: #2a8; }
    .team.notstarted .nm { color: #aaa; }
    .stats {
      display: flex; flex-wrap: wrap; gap: 8px 12px;
      padding: 4px 0 8px; font-size: 12px; color: #555;
      border-bottom: 1px solid #eee;
    }
    .stats b { color: #222; font-weight: 600; }
    .pred {
      padding: 10px 0 4px; font-size: 14px;
      border-top: 1px dashed #ddd; margin-top: 6px;
    }
    .pred .row {
      display: flex; justify-content: space-between; padding: 4px 0;
    }
    .pred .row .lbl { color: #555; }
    .pred .row .val { font-weight: 600; font-feature-settings: "tnum"; }
    .pred .camp .val { color: #c60; }
    .pred .eta .val { color: #06c; }
    /* Mobile: pin to bottom, full-width, fit content without scrolling */
    @media (max-width: 640px) {
      body { font-size: 12px; }
      .panel {
        left: 0; right: 0; bottom: 0;
        max-width: none; border-radius: 10px 10px 0 0;
        max-height: 30vh; padding: 6px 10px 8px;
        overflow: hidden;
      }
      .panel h2 { font-size: 14px; margin: 0 0 2px; }
      .meta { font-size: 10px; margin-bottom: 4px; }
      .team { padding: 2px 0; }
      .team .nm { font-size: 14px; }
      .team .wp { font-size: 12px; margin-top: 1px; }
      .stats { font-size: 11px; gap: 2px 8px; padding: 2px 0 4px; }
      .pred { font-size: 12px; padding: 4px 0 2px; margin-top: 3px; }
      .pred .row { padding: 2px 0; }
      .route-sel { gap: 3px; margin-bottom: 4px; }
      .route-sel a { padding: 4px 6px; font-size: 12px; }
      /* Keep Leaflet controls above the panel and properly sized */
      .leaflet-top.leaflet-left { top: 10px; left: 10px; }
      .leaflet-control-zoom a,
      .leaflet-top.leaflet-left button {
        width: 44px !important; height: 44px !important;
        font-size: 22px !important; line-height: 44px !important;
        padding: 0 !important;
      }
      .tent-icon { font-size: 40px !important; }
      .leaflet-tooltip.team-tt { font-size: 14px !important; padding: 3px 6px !important; }
    }
    .leaflet-tooltip.team-tt { background: rgba(0,0,0,0.75); color: white; border: 0; }
    .tent-icon { line-height: 1; text-shadow: 0 0 3px white, 0 0 3px white, 0 0 3px white; }
    .route-sel {
      display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: nowrap;
    }
    .route-sel a {
      padding: 4px 10px; border-radius: 6px; text-decoration: none;
      background: #eee; color: #333; font-weight: 600; font-size: 13px;
      white-space: nowrap; flex: 1; text-align: center;
    }
    .route-sel a.active { background: #0066cc; color: white; }
    /* Fix Leaflet layer control icon (missing image assets) */
    .leaflet-control-layers-toggle {
      background-image: url(layer.png) !important;
      background-size: 24px 24px !important;
      background-position: center !important;
    }
    .leaflet-control-layers-toggle::after { content: none; }
    @media (max-width: 640px) {
      .route-sel a { font-size: 14px; padding: 6px 8px; }
    }
  </style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <div class="route-sel" id="route-sel"></div>
  <h2 id="title">Ten Tors Tracker</h2>
  <div class="meta" id="meta">loading…</div>
  <div id="teams"></div>
</div>
<script src="vendor/leaflet.js"></script>
<script>
// ---- helpers ----
function haversine(a, b) {
  const R = 6371000;
  const φ1 = a[1] * Math.PI / 180, φ2 = b[1] * Math.PI / 180;
  const dφ = (b[1] - a[1]) * Math.PI / 180;
  const dλ = (b[0] - a[0]) * Math.PI / 180;
  const x = Math.sin(dφ / 2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(dλ / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(x));
}
function parseHHMM(s, base) {
  // Accept HH:MM anywhere in the cell — source includes "CAMPED" suffix etc.
  const m = s && s.match(/(\d{1,2}):(\d{2})/);
  if (!m) return null;
  const d = new Date(base);
  d.setHours(+m[1], +m[2], 0, 0);
  if (+m[1] < 6 && base.getHours() > 12) d.setDate(d.getDate() + 1);
  return d;
}
function bisect(arr, target) {
  let lo = 0, hi = arr.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (arr[mid] < target) lo = mid + 1; else hi = mid;
  }
  return Math.max(0, lo - 1);
}

// ---- route config ----
const ROUTES = {
  B: { label: "Route B", team: "Long Ashton", filter: /long\s*ashton/i, dist: 35, line: "straight line" },
  D: { label: "Route D", team: "Horizon",     filter: /horizon/i,      dist: 35, line: "straight line" },
  E: { label: "Route E", team: "Barracudas",  filter: /barr?acuda/i,   dist: 35, line: "straight line" },
};
const params = new URLSearchParams(location.search);
const ROUTE = (params.get("route") || "E").toUpperCase();
const CFG = ROUTES[ROUTE] || ROUTES.E;

// Build route selector links.
{
  const sel = document.getElementById("route-sel");
  for (const [letter, r] of Object.entries(ROUTES)) {
    const a = document.createElement("a");
    a.href = `?route=${letter}`;
    a.textContent = `${letter}: ${r.team}`;
    if (letter === ROUTE) a.className = "active";
    sel.appendChild(a);
  }
  document.getElementById("title").textContent = `Ten Tors ${CFG.label}`;
  document.title = `Ten Tors ${CFG.label} — Tracker`;
}

// ---- main ----
async function main() {
  const base = `routes/${ROUTE}/`;
  const wps = await (await fetch(base + "waypoints.json")).json();
  const routeGeo = await (await fetch(base + "route.geojson")).json();
  const imgInfo = await (await fetch(base + "image-bounds.json")).json().catch(() => null);

  let routeCoords = routeGeo.features[0].geometry.coordinates.slice(); // [[lon,lat],...]
  // The polyline is a closed loop but its starting index is wherever the
  // contour tracer started (topmost-leftmost), not necessarily at START.
  // Find the index nearest to START (waypoints[0]) and rotate the array.
  const startWp0 = wps[0];
  let rotIdx = 0, rotD = Infinity;
  for (let i = 0; i < routeCoords.length; i++) {
    const d = haversine([startWp0.lon, startWp0.lat], routeCoords[i]);
    if (d < rotD) { rotD = d; rotIdx = i; }
  }
  // Drop the explicit closing duplicate (last == first) before rotating, then
  // rotate so the start point sits at index 0. Re-close with a copy of START.
  if (
    routeCoords.length > 1 &&
    routeCoords[0][0] === routeCoords[routeCoords.length - 1][0] &&
    routeCoords[0][1] === routeCoords[routeCoords.length - 1][1]
  ) routeCoords.pop();
  routeCoords = routeCoords.slice(rotIdx).concat(routeCoords.slice(0, rotIdx));
  routeCoords.push(routeCoords[0]); // close again

  // ---- Manual route corrections (per-route) ----
  const CORRECTIONS_BY_ROUTE = {
    E: [
      { from: "WATER HILL",  to: "POSTBRIDGE", via: [
        [-3.914287, 50.598373],
        [-3.911050, 50.594510],
      ] },
      { from: "POSTBRIDGE",  to: "HIGHER WHITE TOR", via: [
        [-3.918960, 50.594630],
      ] },
      { from: "HARE TOR",    to: "NODDEN GATE", via: [
        [-4.063610, 50.646410],
        [-4.072920, 50.647480],
        [-4.077560, 50.652510],
      ] },
    ],
  };
  const CORRECTIONS = CORRECTIONS_BY_ROUTE[ROUTE] || [];
  const corrOps = [];
  for (const c of CORRECTIONS) {
    const fW = wps.find((w) => w.label === c.from);
    const tW = wps.find((w) => w.label === c.to);
    if (!fW || !tW) { console.warn("correction skipped — wp not found:", c); continue; }
    let fI = -1, tI = -1, fD = Infinity, tD = Infinity;
    for (let i = 0; i < routeCoords.length; i++) {
      const dF = haversine([fW.lon, fW.lat], routeCoords[i]);
      const dT = haversine([tW.lon, tW.lat], routeCoords[i]);
      if (dF < fD) { fD = dF; fI = i; }
      if (dT < tD) { tD = dT; tI = i; }
    }
    if (fI < tI) corrOps.push({ start: fI + 1, end: tI, via: c.via, label: `${c.from}→${c.to}` });
    else console.warn("correction wraps array; skipped:", c.from, c.to);
  }
  // Apply highest-index-first so earlier splices don't shift later indices.
  corrOps.sort((a, b) => b.start - a.start);
  const correctionLog = [];
  for (const op of corrOps) {
    routeCoords.splice(op.start, op.end - op.start, ...op.via);
    correctionLog.push(`${op.label}: replaced ${op.end - op.start} pts with ${op.via.length}`);
  }
  console.log("corrections:", correctionLog);
  // Stash via points so we can plot them after the map is created.
  const VIA_POINTS = CORRECTIONS.flatMap((c) => c.via);
  const CORRECTION_STATUS = correctionLog.length
    ? `${correctionLog.length} correction(s) applied`
    : "no corrections applied";

  // Cumulative distance along the route (metres), now measured from START.
  const cumDist = [0];
  for (let i = 1; i < routeCoords.length; i++) {
    cumDist.push(cumDist[i - 1] + haversine(routeCoords[i - 1], routeCoords[i]));
  }
  const totalDist = cumDist[cumDist.length - 1];

  // NT values from waypoints (populated by build-routes.mjs) or route-specific overrides.
  const NT_OVERRIDES = {
    E: {
      "WATER HILL":      "18:00",
      "POSTBRIDGE":      "18:20",
      "HIGHER WHITE TOR":"18:20",
      "HOLMING BEAM":    "18:10",
      "WHITE BARROW":    "18:30",
      "STANDON FARM":    "17:50",
    },
  };
  const NT = NT_OVERRIDES[ROUTE] || {};
  // Also use any NT values embedded in the waypoints data.
  for (const w of wps) { if (w.nt && !NT[w.label]) NT[w.label] = w.nt; }
  // Snap each waypoint to its nearest route coord, then in route order.
  // Because the polyline is cyclic, "nearest" of a waypoint near START could
  // bind to either index 0 or N-1; force route-order monotonicity by walking
  // forward from the previous waypoint's index.
  let prevIdx = 0;
  const wpStops = wps.map((w, wIdx) => {
    let bestI = prevIdx, bestD = Infinity;
    // Search forward from prevIdx (cyclic) — guarantees waypoints stay in
    // route order even when two waypoints are equidistant from a polyline
    // node.
    for (let off = 0; off < routeCoords.length; off++) {
      const i = (prevIdx + off) % routeCoords.length;
      const d = haversine([w.lon, w.lat], routeCoords[i]);
      if (d < bestD) { bestD = d; bestI = i; }
      // Early-exit guard: don't search the whole loop, only ~80% of it.
      if (off > routeCoords.length * 0.8) break;
    }
    prevIdx = bestI;
    return { ...w, routeIdx: bestI, routeDist: cumDist[bestI], nt: NT[w.label.toUpperCase()] || null };
  });
  console.log("route distances:", wpStops.map((w) => `${w.label}=${(w.routeDist/1000).toFixed(1)}km`).join(", "));

  // ---- map setup ----
  // Compute route bounds (with a small buffer) for initial view + max-bounds.
  let latMin = Infinity, latMax = -Infinity, lonMin = Infinity, lonMax = -Infinity;
  for (const [lon, lat] of routeCoords) {
    if (lat < latMin) latMin = lat; if (lat > latMax) latMax = lat;
    if (lon < lonMin) lonMin = lon; if (lon > lonMax) lonMax = lon;
  }
  const padDeg = 0.02; // ~2 km buffer
  const routeBounds = L.latLngBounds(
    [latMin - padDeg, lonMin - padDeg],
    [latMax + padDeg, lonMax + padDeg]
  );
  // Restrict panning to a slightly larger area so the user can't drift far.
  const panPadDeg = 0.06;
  const maxBounds = L.latLngBounds(
    [latMin - panPadDeg, lonMin - panPadDeg],
    [latMax + panPadDeg, lonMax + panPadDeg]
  );

  const map = L.map("map", {
    maxBounds,
    maxBoundsViscosity: 1.0,
    minZoom: 10,
  }).fitBounds(routeBounds);
  const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© OpenStreetMap · Data: <a href="https://tentors.org.uk" target="_blank">Ten Tors</a>', maxZoom: 19,
  }).addTo(map);

  // Recenter button (bottom-right Leaflet control).
  const RecenterCtl = L.Control.extend({
    options: { position: "topleft" },
    onAdd() {
      const btn = L.DomUtil.create("button", "");
      btn.innerHTML = "⌂ Recenter";
      btn.style.cssText = "padding:6px 10px;border:0;background:white;cursor:pointer;font:13px system-ui;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.3);";
      btn.title = "Reset map to route";
      L.DomEvent.on(btn, "click", (e) => {
        L.DomEvent.stop(e);
        map.fitBounds(routeBounds);
      });
      return btn;
    },
  });
  map.addControl(new RecenterCtl());

  // Route line — built from the live (post-corrections) routeCoords.
  L.polyline(routeCoords.map(([lon, lat]) => [lat, lon]), {
    color: "#0066cc", weight: 3, opacity: 0.85,
  }).addTo(map);

  // Add direction arrows along the route polyline.
  // Use a wide look-ahead window for smooth bearings.
  const routeLatLngs = routeCoords.map(([lon, lat]) => [lat, lon]);
  const arrowCount = 12;
  const arrowInterval = Math.max(1, Math.floor(routeLatLngs.length / arrowCount));
  const lookAhead = Math.max(3, Math.floor(arrowInterval / 2));
  for (let i = arrowInterval; i < routeLatLngs.length - lookAhead; i += arrowInterval) {
    const [lat1, lon1] = routeLatLngs[i];
    const j = Math.min(i + lookAhead, routeLatLngs.length - 1);
    const [lat2, lon2] = routeLatLngs[j];
    const dLat = lat2 - lat1, dLon = (lon2 - lon1) * Math.cos(lat1 * Math.PI / 180);
    const bearing = Math.atan2(dLon, dLat) * 180 / Math.PI; // 0=N, 90=E
    L.marker([lat1, lon1], {
      icon: L.divIcon({
        className: "",
        html: `<div style="font-size:18px;color:#0066cc;transform:rotate(${bearing}deg);opacity:0.7;text-shadow:0 0 2px white,0 0 2px white;">⬆</div>`,
        iconSize: [18, 18], iconAnchor: [9, 9],
      }),
      interactive: false,
    }).addTo(map);
  }

  // Visible marker at each manual via-point (cyan diamond).
  for (const [lon, lat] of VIA_POINTS) {
    L.circleMarker([lat, lon], {
      radius: 5, color: "#0aa", weight: 2,
      fillColor: "#0ff", fillOpacity: 0.9,
    }).addTo(map).bindTooltip("manual via", { direction: "right" });
  }

  // Waypoint markers — will be recoloured on each refresh to show visited/unvisited.
  const wpMarkers = wps.map((w, i) => {
    if (w.lat == null) return null;
    const m = L.circleMarker([w.lat, w.lon], {
      radius: w.via ? 4 : 7,
      color: "white", weight: 2,
      fillColor: "#999", fillOpacity: 0.6,
    }).addTo(map).bindTooltip(`${i + 1}. ${w.label}`, { direction: "right" });
    return m;
  });

  // PDF map overlay: layered, off by default, in the layer control top-right.
  let layerCtl = null;
  if (imgInfo) {
    const pdfOverlay = L.imageOverlay(imgInfo.imagePath, imgInfo.bounds, { opacity: 0.6 });
    layerCtl = L.control.layers(
      { "OSM": osm },
      { [`${CFG.label} PDF map`]: pdfOverlay }
    ).addTo(map);
  }

  // ---- team tracking ----
  const teamLayer = L.layerGroup().addTo(map);
  if (layerCtl) layerCtl.addOverlay(teamLayer, "Teams");

  function normalize(s) {
    return s.toUpperCase().replace(/\s*\(VIA\)\s*$/, "").replace(/\s+/g, " ").trim();
  }

  async function refresh() {
    const html = await (await fetch(`/api/route/${ROUTE.toLowerCase()}?_=` + Date.now())).text();
    const doc = new DOMParser().parseFromString(html, "text/html");

    // Last-updated stamp.
    const updMatch = doc.body.textContent.match(/Last updated[^0-9]*(\d{1,2}:\d{2})/i);
    const updated = updMatch ? updMatch[1] : null;

    // Find the largest table — that's the team data.
    const tables = [...doc.querySelectorAll("table")];
    if (!tables.length) { document.getElementById("meta").textContent = `no table found in route${ROUTE.toLowerCase()}.html`; return; }
    let table = tables[0];
    for (const t of tables) if (t.querySelectorAll("tr").length > table.querySelectorAll("tr").length) table = t;

    const rows = [...table.querySelectorAll("tr")];
    const headers = [...rows[0].querySelectorAll("th, td")].map((c) => c.textContent.trim());
    // Map column index → wpStops entry by name match.
    const colToWp = headers.map((h, idx) => {
      if (idx === 0) return null; // team-name col
      const target = normalize(h);
      return wpStops.find((w) => normalize(w.label) === target) || null;
    });

    const TEAM_FILTER = CFG.filter;
    const teams = [];
    for (const row of rows.slice(1)) {
      const cells = [...row.querySelectorAll("th, td")].map((c) => c.textContent.trim());
      if (cells.length < 2 || !cells[0]) continue;
      if (!TEAM_FILTER.test(cells[0])) continue;
      teams.push({ name: cells[0], cells: cells.slice(1) });
    }

    // Use the team's reported "now" (last-updated time today) for pace calc.
    const now = new Date();
    document.getElementById("meta").innerHTML =
      `<a href="https://tentors.org.uk/eventdata/route${ROUTE.toLowerCase()}.html" target="_blank" style="color:#4af;text-decoration:underline">Source</a> updated: ${updated || "?"}    Now: ${now.toLocaleTimeString().slice(0, 5)}    ${teams.length} team${teams.length !== 1 ? "s" : ""}    (route: ${CFG.line})`;

    teamLayer.clearLayers();
    const panel = document.getElementById("teams");
    panel.innerHTML = "";

    // Track visited waypoints across all teams for marker colouring.
    const visitedWpLabels = new Set();

    for (const team of teams) {
      // Find their last reached waypoint (latest non-empty cell with a time).
      // Source cells like "19:40\nCAMPED" mean: arrived at 19:40 and the SC
      // has flagged them as camping at this waypoint — definitive ground
      // truth, overrides any pace-based prediction.
      let firstT = null, lastT = null, lastIdx = -1, lastWp = null;
      let campedAtCell = -1;
      for (let i = 0; i < team.cells.length; i++) {
        const wp = colToWp[i + 1];
        const cell = team.cells[i];
        const t = parseHHMM(cell, now);
        if (t && wp) {
          if (firstT === null) firstT = t;
          lastT = t; lastIdx = i; lastWp = wp;
          visitedWpLabels.add(normalize(wp.label));
          if (/CAMPED/i.test(cell)) campedAtCell = i;
        }
      }
      const isCamped = campedAtCell >= 0;

      const row = document.createElement("div");
      row.className = "team";
      let status = "—", pace = "", pos = null;
      if (lastWp == null) {
        row.classList.add("notstarted");
        status = "not started";
      } else {
        // Pace: total distance from start waypoint up to last reached.
        const startWp = wpStops[0];
        const distSoFar = lastWp.routeDist - startWp.routeDist;
        const elapsedH = Math.max((lastT - firstT) / 3600000, 1 / 60);
        const paceKmh = distSoFar / 1000 / elapsedH;

        // Decide whether the team is still moving or has stopped.
        // Reasons to stop: finished; SC flagged CAMPED; next NT unreachable
        // at current pace; or it's evening (after 19:00) — all teams camp.
        const isFinished = normalize(lastWp.label) === "FINISH";
        const isEvening = now.getHours() >= 19 || now.getHours() < 7;
        let stopped = isFinished || isCamped || isEvening, missedNt = null;
        if (!stopped) {
          const startIdx = wpStops.findIndex((w) => w === lastWp);
          for (let k = startIdx + 1; k < wpStops.length; k++) {
            const wp = wpStops[k];
            if (!wp.nt) continue;
            const segDist = wp.routeDist - lastWp.routeDist;
            const segH = segDist / 1000 / Math.max(paceKmh, 0.01);
            const projArr = new Date(lastT.getTime() + segH * 3600000);
            const ntDate = parseHHMM(wp.nt, lastT);
            if (projArr > ntDate) { stopped = true; missedNt = wp; }
            break; // only the first upcoming NT-bound waypoint matters
          }
        }

        let target;
        if (stopped) {
          // Use the waypoint's actual coordinates, not the route polyline
          pos = [lastWp.lat, lastWp.lon];
          target = lastWp.routeDist;
        } else {
          const sinceLast = (now - lastT) / 3600000;
          const extrap = Math.max(0, paceKmh * sinceLast * 1000);
          target = Math.min(lastWp.routeDist + extrap, totalDist);
        }
        if (!pos) {
          const i = bisect(cumDist, target);
          const t = (target - cumDist[i]) / (cumDist[i + 1] - cumDist[i] || 1);
          const a = routeCoords[i], b = routeCoords[i + 1] || a;
          pos = [a[1] + t * (b[1] - a[1]), a[0] + t * (b[0] - a[0])];
        }

        if (isFinished) row.classList.add("finished");
        const cellTime = (team.cells[lastIdx].match(/(\d{1,2}:\d{2})/) || [])[1] || team.cells[lastIdx];
        status = isFinished
          ? `finished at ${cellTime}`
          : isCamped || isEvening
            ? `⛺ camped at ${lastWp.label} (${cellTime})`
            : stopped
              ? `stopped at ${lastWp.label} (${cellTime})`
              : `${lastWp.label} @ ${cellTime}`;
        pace = paceKmh > 0 ? ` · ${paceKmh.toFixed(1)} km/h` : "";

        // Stash for the prediction block below.
        team._stopped = stopped;
        team._isCamped = isCamped || isEvening;
        team._missedNt = missedNt;
        team._isFinished = isFinished;
        team._paceKmh = paceKmh;
      }

      row.innerHTML = `<div class="nm">${team.name}</div>
                       <div class="wp">${status}<span class="pace">${pace}</span></div>`;
      panel.appendChild(row);

      // Stats card: covered, remaining, pace.
      if (lastWp) {
        const distFromStart = lastWp.routeDist - wpStops[0].routeDist;
        const stats = document.createElement("div");
        stats.className = "stats";
        stats.innerHTML = `
          <span><b>${(distFromStart/1000).toFixed(1)}</b> km covered</span>
          <span><b>${((totalDist - lastWp.routeDist)/1000).toFixed(1)}</b> km remaining</span>
          <span>updated <b>${lastT.toLocaleTimeString().slice(0,5)}</b></span>`;
        panel.appendChild(stats);
      }

      if (pos) {
        const m = L.circleMarker(pos, {
          radius: 8, color: "white", weight: 2,
          fillColor: "#e60", fillOpacity: 0.95,
        }).addTo(teamLayer);
        m.bindTooltip(team.name, {
          direction: "right", className: "team-tt", offset: [10, 0],
          permanent: true,
        });

        // ---- prediction block ----
        const pred = document.createElement("div");
        pred.className = "pred";
        panel.appendChild(pred);
        const paceKmh = team._paceKmh;

        if (team._isFinished) {
          pred.innerHTML = `<div class="row eta"><span class="lbl">🏁 Finished</span><span class="val">${(team.cells[lastIdx].match(/(\d{1,2}:\d{2})/)||[])[1] || team.cells[lastIdx]}</span></div>`;
        } else if (team._stopped) {
          // They camp at lastWp; show that, plus the NT they couldn't make,
          // plus Sunday-restart finish ETA.
          const isMobile = window.innerWidth <= 640;
          const tentSize = isMobile ? 64 : 32;
          const tent = L.divIcon({
            className: "",
            html: `<div class="tent-icon" style="font-size:${isMobile ? 56 : 28}px;">⛺</div>`,
            iconSize: [tentSize, tentSize], iconAnchor: [tentSize / 2, tentSize - 4],
          });
          L.marker([lastWp.lat, lastWp.lon], { icon: tent })
            .addTo(teamLayer)
            .bindTooltip(`Camp: ${lastWp.label}`, { direction: "right", offset: [12, -10] });
          const sunday0600 = new Date(now);
          sunday0600.setDate(sunday0600.getDate() + 1);
          sunday0600.setHours(6, 0, 0, 0);
          const remainingKm = (totalDist - lastWp.routeDist) / 1000;
          const hoursToFinish = remainingKm / Math.max(paceKmh, 0.01);
          const etaTime = new Date(sunday0600.getTime() + hoursToFinish * 3600000);
          const missedRow = team._missedNt
            ? `<div class="row"><span class="lbl">✕ Couldn't make</span><span class="val">${team._missedNt.label} NT ${team._missedNt.nt}</span></div>`
            : "";
          pred.innerHTML = `
            <div class="row camp">
              <span class="lbl">⛺ Camp tonight</span>
              <span class="val">${lastWp.label}</span>
            </div>
            ${missedRow}
            <div class="row">
              <span class="lbl">↑ Restart Sunday</span>
              <span class="val">06:00 · ${remainingKm.toFixed(1)} km left</span>
            </div>
            <div class="row eta">
              <span class="lbl">🏁 ETA at FINISH</span>
              <span class="val">${etaTime.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",hour12:false})} Sun</span>
            </div>`;
        } else if (paceKmh > 0) {
          // Still moving and on track to make every published NT.
          const remainingKm = (totalDist - lastWp.routeDist) / 1000;
          const hoursToFinish = remainingKm / paceKmh;
          const etaTime = new Date(lastT.getTime() + hoursToFinish * 3600000);
          pred.innerHTML = `
            <div class="row eta">
              <span class="lbl">🏁 ETA at FINISH</span>
              <span class="val">${etaTime.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",hour12:false})} · ${remainingKm.toFixed(1)} km left</span>
            </div>`;
        }
      }
    }

    // Recolour waypoint markers: visited = green, unvisited = grey hollow.
    wps.forEach((w, i) => {
      if (!wpMarkers[i]) return;
      const visited = visitedWpLabels.has(normalize(w.label));
      wpMarkers[i].setStyle({
        fillColor: visited ? "#0a4" : "#ccc",
        fillOpacity: visited ? 0.95 : 0.4,
        color: visited ? "white" : "#999",
        weight: visited ? 2 : 1.5,
        radius: visited ? 7 : (w.via ? 4 : 6),
      });
    });

    // Auto-zoom to show team positions with some context.
    // Include the team marker(s) plus the next unvisited waypoint.
    const zoomPoints = [];
    teamLayer.eachLayer((l) => {
      if (l.getLatLng) zoomPoints.push(l.getLatLng());
    });
    // Add the next unvisited waypoint so you can see where they're heading.
    for (const w of wpStops) {
      if (!visitedWpLabels.has(normalize(w.label))) {
        zoomPoints.push(L.latLng(w.lat, w.lon));
        break;
      }
    }
    if (zoomPoints.length) {
      const teamBounds = L.latLngBounds(zoomPoints).pad(0.3);
      map.fitBounds(teamBounds, { paddingBottomRight: [0, window.innerWidth <= 640 ? window.innerHeight * 0.3 : 0] });
    }
  }

  refresh();
  setInterval(refresh, 60_000);

  // ---- auto-reload on deploy ----
  // Poll /api/version every 60 s. If the deployed commit SHA changes, reload
  // the page so the user gets the new code without refreshing manually.
  let bootVersion = null;
  async function checkVersion() {
    try {
      const v = await (await fetch("/api/version?_=" + Date.now())).json();
      if (bootVersion === null) {
        bootVersion = v.sha;
      } else if (v.sha && v.sha !== bootVersion) {
        location.reload();
      }
    } catch (_) { /* ignore */ }
  }
  checkVersion();
  setInterval(checkVersion, 60_000);
}
main().catch((e) => {
  document.getElementById("meta").textContent = "error: " + e.message;
  console.error(e);
});
</script>
</body>
</html>
